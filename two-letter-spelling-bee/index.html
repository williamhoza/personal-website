<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />

        <link rel="manifest" href="manifest.json?v=2" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

        <style>
            * {
                font-family: "Lexend", sans-serif;
            }

            html, body {
                width:100%;
                height:100%;
                max-width:100%;
                max-height:100%;
                margin: 0;
                padding: 0;
                overflow:hidden;
            }

            main {
                margin:auto;
                max-width:500px;
                display:none; /* will be flex when visible */
                flex-direction:column;
                height:100%;
            }

            #prize-placeholder {
                flex: 0 0 90px;
            }

            #letter-placeholder {
                flex: 0 0 250px;
            }

            #illustration {
                flex: 1 1 100%;
                height: 100%;
                object-fit:contain;
            }

            #next {
                display:none;
                padding:10px;
                font-size:20px;
                position:absolute;
                bottom:50px;
                left:50%;
                transform:translateX(-50%);
            }

            #start, #reset {
                display:block;
                margin:auto;
                margin-top:100px;
                padding:10px;
                font-size:20px;
            }

            .prize-cell {
                width:45px;
                height:45px;
                display:inline-block;
                position:absolute;
                border:1px solid #888;
                box-sizing:border-box;
            }

            .prize-cell.highlighted {
                border-width:4px;
                width:48px;
                height:48px;
                transform:translate(-2px, -2px);
            }

            .prize {
                width:44px;
                height:44px;
                text-align:center;
                align-content:center;
                font-size:29px;
                cursor:move;
                position:absolute;
                display:none;
            }

            .prize.free {
                transition: left 500ms ease-out, top 500ms ease-out;
            }

            .letter-space {
                width:61px;
                height:61px;
                display:inline-block;
                position:absolute;
                border:3px dashed #888;
                box-sizing:border-box;
            }

            .letter-space.highlighted {
                border-color:#00f;
            }

            .correctness-indicator {
                width:61px;
                padding-top:5px;
                display:inline-block;
                position:absolute;
                font-size:12px;
                text-align:center;
            }

            .letter-block {
                width:61px;
                height:61px;
                text-align:center;
                align-content:center;
                font-size:35px;
                cursor:move;
                position:absolute;
            }

            .letter-block.free {
                transition: left 200ms ease-out, top 200ms ease-out;
            }

            #skip {
                position:absolute;
                left:10px;
                bottom:204px;
            }
        </style>
    </head>

    <body>
        <div id="loading-stuff">
            <button id="start" onclick="start();" disabled>Loading...</button>
            <button id="reset" onclick="resetPrizes();">Reset prizes</button>
        </div>

        <main>
            <div id="prize-placeholder"></div>
            <img id="illustration" onclick="sayPrompt();" />
            <div id="letter-placeholder"></div>
            <button id="next" onclick="presentNewWord();">Next</button>
            <button id="skip" onclick="skip();">🛟</button>
        </main>

        <script>
            const PRIZE_EMOJIS = ["⭐", "🪙", "🎈", "🍪", "🌻", "🍭", "🍀", "🍩", "🪩", "🏆", "💎", "👑"];
            const DIFFICULT_MODE_STREAK_THRESHOLD = 8;
            const PRIZE_ROWS = 2;
            const PRIZE_COLUMNS = 6;
            const LETTER_BLOCK_ROWS = 2;
            const LETTER_BLOCK_COLUMNS = 4;
            const EASY_WORD_RANDOMNESS = 8;
            const DIFFICULT_WORD_RANDOMNESS = 4;

            let easyWords = [];
            let difficultWords = [];
            let streak = 0;
            let currentWord = null;
            let correctAudio;
            let difficultAudio;
            let sentenceAudio = new Audio();
            let promptAvailable = true;
            let prizeCells = [];
            let currentSpeech = null;
            let letterBlocks = [];
            let letterSpaces = [];
            let debugMode = (new URLSearchParams(window.location.search)).has("debug");

            function resetPrizes() {
                if (prompt("Are you sure? Type 'reset prizes' to confirm.") == "reset prizes") {
                    for (let i = 0; i < prizeCells.length; i++) {
                        prizeCells[i].rank = -1;
                        prizeCells[i].updatePrize(true);
                    }
                }
            }

            class PrizeCell {
                constructor(row, column) {
                    this.row = row;
                    this.column = column;

                    this.square = document.createElement("div");
                    this.square.classList.add("prize-cell");
                    if (debugMode) this.square.style.backgroundColor="#ddd";
                    document.querySelector("main").appendChild(this.square);

                    const savedRank = debugMode ? null : localStorage.getItem("tlsb-prize-" + this.row + "-" + this.column, this.rank); 
                    this.rank = savedRank == null ? -1 : parseInt(savedRank);

                    this.prize = document.createElement("div");
                    this.prize.classList.add("prize");
                    this.prize.classList.add("free");
                    document.querySelector("main").appendChild(this.prize);

                    this.setPosition();

                    this.prize.addEventListener('mousedown', this.startDrag.bind(this));
                    this.prize.addEventListener('mousemove', this.drag.bind(this));
                    this.prize.addEventListener('mouseup', this.endDrag.bind(this));
                    this.prize.addEventListener('mouseleave', this.endDrag.bind(this));
                    this.prize.addEventListener('touchstart', this.startDrag.bind(this));
                    this.prize.addEventListener('touchmove', this.drag.bind(this));
                    this.prize.addEventListener('touchend', this.endDrag.bind(this));
                    this.prize.addEventListener('touchleave', this.endDrag.bind(this));
                    this.prize.addEventListener('touchcancel', this.endDrag.bind(this));
                }

                setPosition() {
                    this.left = document.body.clientWidth / 2 - 44 * PRIZE_COLUMNS / 2 + this.column * 44;
                    this.top = this.row * 44;
                    
                    this.square.style.left = this.left + "px";
                    this.square.style.top = this.top + "px";

                    this.updatePrize(true);
                }

                startDrag(evt) {
                    if (evt.touches) evt = evt.touches[0];
                    this.dragStartMX = evt.clientX;
                    this.dragStartMY = evt.clientY;
                    this.dragStartLeft = this.prize.offsetLeft;
                    this.dragStartTop = this.prize.offsetTop;
                    this.dragging = true;
                    this.prize.classList.remove("free");
                }

                drag(evt) {
                    if (this.dragging) {
                        evt.preventDefault();
                        if (evt.touches) evt = evt.touches[0];

                        this.prizeLeft = this.dragStartLeft + evt.clientX - this.dragStartMX;
                        this.prizeTop = this.dragStartTop + evt.clientY - this.dragStartMY;
                        this.prize.style.left = this.prizeLeft + "px";
                        this.prize.style.top = this.prizeTop + "px";

                        // Inefficient, but simple
                        for (let i = 0; i < prizeCells.length; i++) {
                            if (this.prizeIsIn(prizeCells[i]) && (prizeCells[i].rank == -1 || prizeCells[i].rank == this.rank)) {
                                prizeCells[i].square.classList.add("highlighted");
                            } else {
                                prizeCells[i].square.classList.remove("highlighted");
                            }
                        }
                    }
                }

                endDrag(evt) {
                    if (this.dragging) {
                        this.dragging = false;
                        this.prize.classList.add("free");
                        let moved = false;

                        for (let i = 0; i < prizeCells.length; i++) {
                            prizeCells[i].square.classList.remove("highlighted");
                            if (this.prizeIsIn(prizeCells[i])) {
                                if (prizeCells[i].rank == -1) {
                                    prizeCells[i].rank = this.rank;
                                    this.rank = -1;
                                    prizeCells[i].updatePrize(true);
                                    this.updatePrize(true);
                                    moved = true;
                                } else if (prizeCells[i].rank == this.rank && prizeCells[i] != this) {
                                    // Merge
                                    prizeCells[i].rank = this.rank + 1;
                                    this.rank = -1;
                                    prizeCells[i].updatePrize(true);
                                    this.updatePrize(true);
                                    moved = true;
                                    upgradeAudio.currentTime = 0;
                                    upgradeAudio.play();
                                }
                                
                                break;
                            }
                        }

                        if (!moved) {
                            this.prize.style.left = this.left + 1 + "px";
                            this.prize.style.top = this.top + 1 + "px";
                        }
                    }
                }

                updatePrize(instant) {
                    if (this.rank == -1) {
                        this.prize.innerHTML = "";
                        this.prize.style.left = Math.round(-45 + Math.random() * (document.body.clientWidth + 45)) + "px";
                        this.prize.style.top = document.body.clientHeight + "px";
                        this.prize.style.display = "none";
                        this.prize.classList.add("free");
                    } else {
                        this.prize.innerHTML = PRIZE_EMOJIS[this.rank];
                        this.prize.style.display = "block";
                        if (instant) {
                            this.prize.classList.remove("free");
                            this.prize.style.left = this.left + 1 + "px";
                            this.prize.style.top = this.top + 1 + "px";
                        } else {
                            this.prize.classList.add("free");
                            setTimeout(function() {
                                this.prize.style.left = this.left + 1 + "px";
                                this.prize.style.top = this.top + 1 + "px";
                            }.bind(this), 500);
                        }
                    }

                    if (!debugMode) localStorage.setItem("tlsb-prize-" + this.row + "-" + this.column, this.rank);
                }

                prizeIsIn(cell) {
                    return this.prizeLeft >= cell.left - 22 && this.prizeLeft < cell.left + 22 && this.prizeTop >= cell.top - 22 && this.prizeTop < cell.top + 22;
                }
            }

            class LetterSpace {
                constructor(pos) {
                    this.pos = pos;
                    this.correctLetter = "?";

                    this.square = document.createElement("div");
                    this.square.classList.add("letter-space");
                    document.querySelector("main").appendChild(this.square);

                    this.correctnessIndicator = document.createElement("div");
                    this.correctnessIndicator.classList.add("correctness-indicator");
                    document.querySelector("main").appendChild(this.correctnessIndicator);

                    this.letterBlock = null;

                    this.setPosition();
                }

                setPosition() {
                    // Box is 61 x 61
                    this.left = document.body.clientWidth / 2 - 71 + 71 * this.pos + 5;
                    this.top = document.body.clientHeight - 245;

                    this.square.style.left = this.left + "px";
                    this.square.style.top = this.top + "px";
                    this.correctnessIndicator.style.left = this.left + "px";
                    this.correctnessIndicator.style.top = (this.top + 61) + "px";

                    if (this.letterBlock != null) {
                        this.letterBlock.elt.style.left = this.left + "px";
                        this.letterBlock.elt.style.top = this.top + "px";
                    }
                }

                // Note: Letter blocks are responsible for managing their own .letterSpace fields
                setLetterBlock(block, credit=true) {
                    this.letterBlock = block;
                    if (this.letterBlock == null) {
                        this.correctnessIndicator.innerHTML = "";
                        this.square.classList.remove("highlighted");
                    } else {
                        this.square.classList.add("highlighted");
                        if (this.letterBlock.letter == this.correctLetter) {
                            this.correctnessIndicator.innerHTML = "✅";
                        } else {
                            this.correctnessIndicator.innerHTML = "❌";
                            streak = -1;
                        }
                    }

                    checkForCorrectness(credit);
                }
            }

            function skip() {

                // Inefficient, but simple
                let correctBlocks = [];
                for (let i = 0; i < letterBlocks.length; i++) {
                    for (let j = 0; j < currentWord.text.length; j++) {
                        if (letterBlocks[i].letter == currentWord.text[j]) {
                            correctBlocks[j] = letterBlocks[i];
                        }
                    }
                }

                for (let i = 0; i < letterSpaces.length; i++) {
                    if (letterSpaces[i].letterBlock != null) letterSpaces[i].letterBlock.letterSpace = null;
                    letterSpaces[i].setLetterBlock(null);
                }

                for (let i = 0; i < letterSpaces.length; i++) {
                    correctBlocks[i].letterSpace = letterSpaces[i];
                    letterSpaces[i].setLetterBlock(correctBlocks[i], false);
                    correctBlocks[i].elt.classList.add("free");
                    setTimeout(function() {
                        correctBlocks[i].elt.style.left = letterSpaces[i].left + "px";
                        correctBlocks[i].elt.style.top = letterSpaces[i].top + "px";
                    }, 0);
                }
            }

            async function checkForCorrectness(credit=true) {
                let correct = true;
                for (let i = 0; i < letterSpaces.length; i++) {
                    if (letterSpaces[i].letterBlock == null || letterSpaces[i].letterBlock.letter != letterSpaces[i].correctLetter) {
                        correct = false;
                        break;
                    }
                }

                if (correct) {
                    promptAvailable = false;    
                    for (let i = 0; i < letterBlocks.length; i++) {
                        if (letterBlocks[i].letterSpace == null) {
                            letterBlocks[i].elt.style.display = "none";
                        }
                    }

                    if (credit) {
                        streak = streak + 1;

                        // Award a prize
                        let availableCells = [];
                        for (let i = 0; i < prizeCells.length; i++) {
                            if (prizeCells[i].rank == -1) availableCells.push(prizeCells[i]);
                        }
                        if (availableCells.length > 0) {
                            cell = availableCells[Math.floor(Math.random() * availableCells.length)];
                            cell.rank = 0;
                            cell.updatePrize(false);
                        }

                        playNonOverlapping(correctAudio);
                    } else {
                        streak = -1;
                    }

                    document.querySelector("#skip").disabled = "true";
                    document.querySelector("#next").innerHTML = "Loading...";
                    document.querySelector("#next").disabled = "true";
                    document.querySelector("#next").style.display = "block";
                    await pickNewWord();
                    document.querySelector("#next").innerHTML = "Next";
                    document.querySelector("#next").disabled = "";
                }
            }

            class LetterBlock {
                constructor(row, column) {
                    this.row = row;
                    this.column = column;
                    this.letter = "?";

                    this.elt = document.createElement("div");
                    this.elt.classList.add("letter-block");
                    document.querySelector("main").appendChild(this.elt);

                    this.elt.addEventListener('mousedown', this.startDrag.bind(this));
                    this.elt.addEventListener('mousemove', this.drag.bind(this));
                    this.elt.addEventListener('mouseup', this.endDrag.bind(this));
                    this.elt.addEventListener('mouseleave', this.endDrag.bind(this));
                    this.elt.addEventListener('touchstart', this.startDrag.bind(this));
                    this.elt.addEventListener('touchmove', this.drag.bind(this));
                    this.elt.addEventListener('touchend', this.endDrag.bind(this));
                    this.elt.addEventListener('touchleave', this.endDrag.bind(this));
                    this.elt.addEventListener('touchcancel', this.endDrag.bind(this));

                    this.present();
                }

                present() {
                    this.letterSpace = null;
                    this.elt.innerHTML = this.letter.toUpperCase();
                    this.elt.style.display = "block";
                    this.elt.classList.remove("free");
                    this.setPosition();
                }

                eltIsIn(letterSpace) {
                    return this.eltLeft >= letterSpace.left - 31 && this.eltLeft < letterSpace.left + 31 && this.eltTop >= letterSpace.top - 31 && this.eltTop < letterSpace.top + 31;
                }

                startDrag(evt) {
                    // TODO: Unify / consolidate with prize drag logic...
                    if (evt.touches) evt = evt.touches[0];
                    this.dragStartMX = evt.clientX;
                    this.dragStartMY = evt.clientY;
                    this.dragStartLeft = this.elt.offsetLeft;
                    this.dragStartTop = this.elt.offsetTop;
                    this.dragging = true;
                    this.elt.classList.remove("free");
                    if (this.letterSpace != null) this.letterSpace.setLetterBlock(null);
                    this.letterSpace = null;
                }

                drag(evt) {
                    if (this.dragging) {
                        evt.preventDefault();
                        if (evt.touches) evt = evt.touches[0];

                        this.eltLeft = this.dragStartLeft + evt.clientX - this.dragStartMX;
                        this.eltTop = this.dragStartTop + evt.clientY - this.dragStartMY;
                        this.elt.style.left = this.eltLeft + "px";
                        this.elt.style.top = this.eltTop + "px";

                        // Inefficient, but simple
                        for (let i = 0; i < letterSpaces.length; i++) {
                            if (this.eltIsIn(letterSpaces[i])) {
                                letterSpaces[i].square.classList.add("highlighted");
                            } else if (letterSpaces[i].letterBlock == null) {
                                letterSpaces[i].square.classList.remove("highlighted");
                            }
                        }
                    }
                }

                endDrag(evt) {
                    if (this.dragging) {
                        this.dragging = false;
                        this.elt.classList.add("free");

                        for (let i = 0; i < letterSpaces.length; i++) {
                            if (this.eltIsIn(letterSpaces[i])) {
                                if (letterSpaces[i].letterBlock != null) letterSpaces[i].letterBlock.exitLetterSpace();

                                this.elt.style.left = letterSpaces[i].left + "px";
                                this.elt.style.top = letterSpaces[i].top + "px";
                                this.letterSpace = letterSpaces[i];
                                letterSpaces[i].setLetterBlock(this);
                            }
                        }

                        if (this.letterSpace == null) {
                            setTimeout(function() {
                                this.elt.style.left = this.homeLeft + "px";
                                this.elt.style.top = this.homeTop + "px";
                            }.bind(this), 0);
                        }
                    }
                }

                exitLetterSpace() {
                    this.letterSpace.setLetterBlock(null);
                    this.letterSpace = null;
                    this.elt.classList.add("free");
                    setTimeout(function() {
                        this.elt.style.left = this.homeLeft + "px";
                        this.elt.style.top = this.homeTop + "px";
                    }.bind(this), 0);
                }

                setPosition() {
                    this.homeLeft = document.body.clientWidth / 2 - 75 * LETTER_BLOCK_COLUMNS / 2 + this.column * 75 + 7;
                    this.homeTop = document.body.clientHeight - 75 * LETTER_BLOCK_ROWS + this.row * 75 + 7;
                    
                    if (this.letterSpace == null) {
                        this.elt.style.left = this.homeLeft + "px";
                        this.elt.style.top = this.homeTop + "px";
                    }
                }
            }

            class Word {
                constructor(ob) {
                    this.text = ob["word"];
                    this.difficult = ob["difficult"];
                    this.decoys = ob["decoys"] || [];
                }

                loadAudio() {
                    sentenceAudio.src = "audio/" + this.text + ".mp3?v=6";
                    sentenceAudio.load();
                    return loadPromise(sentenceAudio);
                }
            }

            function loadPromise(audio) {
                return new Promise(function(resolve) {
                    audio.addEventListener("canplaythrough", resolve);
                });
            }

            async function init() {
                let res = await fetch("data.json?v=7");
                let arr = await res.json();
                let audioPromiseArray = [];
                
                for (let i = 0; i < arr.length; i++) {
                    let newWord = new Word(arr[i]);
                    if (newWord.difficult) {
                        difficultWords.push(newWord);
                    } else {
                        easyWords.push(newWord);
                    }
                }

                shuffle(easyWords);
                shuffle(difficultWords);

                correctAudio = new Audio("audio/correct.mp3?v=5");
                audioPromiseArray.push(loadPromise(correctAudio));
                difficultAudio = new Audio("audio/difficult.mp3?v=5");
                audioPromiseArray.push(loadPromise(difficultAudio));
                upgradeAudio = new Audio("audio/upgrade.mp3?v=5");
                audioPromiseArray.push(loadPromise(upgradeAudio));

                for (let r = 0; r < PRIZE_ROWS; r++) {
                    for (let c = 0; c < PRIZE_COLUMNS; c++) {
                        prizeCells.push(new PrizeCell(r, c));
                    }
                }

                for (let i = 0; i < 2; i++) {
                    letterSpaces.push(new LetterSpace(i));
                }

                for (let r = 0; r < LETTER_BLOCK_ROWS; r++) {
                    for (let c = 0; c < LETTER_BLOCK_COLUMNS; c++) {
                        letterBlocks.push(new LetterBlock(r, c));
                    }
                }

                window.addEventListener("resize", function() {
                    for (let i = 0; i < prizeCells.length; i++) {
                        prizeCells[i].setPosition();
                    }

                    for (let i = 0; i < 2; i++) {
                        letterSpaces[i].setPosition();
                    }

                    for (let i = 0; i < letterBlocks.length; i++) {
                        letterBlocks[i].setPosition();
                    }
                })

                audioPromiseArray.push(pickNewWord());
                await Promise.all(audioPromiseArray);

                document.querySelector("#start").disabled = "";
                document.querySelector("#start").innerHTML = "Start!";
            }

            function start() {
                document.querySelector("#loading-stuff").style.display = "none";
                document.querySelector("main").style.display = "flex";
                presentNewWord();
            }

            // Fisher-Yates
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            function pickNewWord() {
                let difficultProbability;

                if (streak >= DIFFICULT_MODE_STREAK_THRESHOLD) {
                    difficultProbability = difficultWords.length / (easyWords.length + difficultWords.length);
                } else {
                    difficultProbability = 0;
                }

                if (Math.random() < difficultProbability) {
                    // Difficult word
                    currentWord = difficultWords.splice(Math.floor(Math.random() * DIFFICULT_WORD_RANDOMNESS), 1)[0];
                    difficultWords.push(currentWord);
                } else {
                    // Easy word
                    currentWord = easyWords.splice(Math.floor(Math.random() * EASY_WORD_RANDOMNESS), 1)[0];
                    easyWords.push(currentWord);
                }

                // Include the five primary vowels
                let letterOptions = ["a", "e", "i", "o", "u"];

                // Include the actual letters of the word
                for (let i = 0; i < currentWord.text.length; i++) {
                    if (!letterOptions.includes(currentWord.text[i])) {
                        letterOptions.push(currentWord.text[i]);
                    }
                }

                // Include one decoy letter, if available
                shuffle(currentWord.decoys);
                for (let i = 0; i < currentWord.decoys.length; i++) {
                    if (!letterOptions.includes(currentWord.decoys[i])) {
                        letterOptions.push(currentWord.decoys[i]);
                        break;
                    }
                }

                // Fill the rest of the slots randomly
                let candidates = ["b", "c", "d", "f", "g", "h", "j", "k", "l", "m", "n", "p", "q", "r", "s", "t", "v", "w", "x", "y", "z"];
                shuffle(candidates);
                for (let i = 0; i < candidates.length; i++) {
                    console.assert(letterOptions.length <= LETTER_BLOCK_COLUMNS * LETTER_BLOCK_ROWS);
                    if (letterOptions.length == LETTER_BLOCK_COLUMNS * LETTER_BLOCK_ROWS) break;
                    if (!letterOptions.includes(candidates[i])) letterOptions.push(candidates[i]);
                }

                letterOptions.sort();
                for (let i = 0; i < letterBlocks.length; i++) {
                    letterBlocks[i].letter = letterOptions[i];
                }

                for (let i = 0; i < letterSpaces.length; i++) {
                    letterSpaces[i].correctLetter = currentWord.text[i];
                }

                difficultAudio.pause();
                return currentWord.loadAudio();
            }

            async function presentNewWord() {
                document.querySelector("#next").style.display = "none";
                document.querySelector("#skip").disabled = "";
                document.querySelector("#illustration").src = "images/" + currentWord.text + ".png";
                for (let i = 0; i < letterSpaces.length; i++) {
                    letterSpaces[i].setLetterBlock(null);
                }
                for (let i = 0; i < letterBlocks.length; i++) {
                    letterBlocks[i].present();
                }
                promptAvailable = true;
                sayPrompt();
            }

            function playNonOverlapping(audio) {
                if (currentSpeech != null) currentSpeech.pause();
                currentSpeech = audio;
                audio.currentTime = 0;
                audio.play();
                return new Promise(function(resolve) {
                    audio.addEventListener("ended", resolve);
                })
            }

            async function sayPrompt() {
                if (promptAvailable) {
                    if (currentWord.difficult) await playNonOverlapping(difficultAudio);
                    return playNonOverlapping(sentenceAudio);
                }
            }

            function say(txt) {
                synth.cancel();
                let utterance = new SpeechSynthesisUtterance(txt);
                utterance.rate = 0.5;
                synth.speak(utterance);
                return utterance;
            }

            init();
        </script>
